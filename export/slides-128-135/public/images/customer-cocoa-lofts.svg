<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-label="Cocoa Lofts placeholder hero">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6BA3D4"/>
      <stop offset="55%" stop-color="#B8D4EE"/>
      <stop offset="100%" stop-color="#E8D4B8"/>
