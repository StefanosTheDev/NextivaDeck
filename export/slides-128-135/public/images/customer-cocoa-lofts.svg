  <rect x="0" y="0" width="1200" height="200" fill="rgba(0,0,0,0.25)"/>
  <text x="600" y="95" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="56" font-weight="700" fill="#FFFFFF">Cocoa Lofts</text>
  <text x="600" y="145" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="24" font-weight="600" fill="rgba(255,255,255,0.92)">900 Friday Rd · Cocoa, Florida</text>
