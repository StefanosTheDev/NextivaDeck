    <rect x="248" y="420" width="88" height="110" rx="4"/>
    <rect x="366" y="420" width="88" height="110" rx="4"/>
    <rect x="484" y="420" width="88" height="110" rx="4"/>
    <rect x="602" y="420" width="88" height="110" rx="4"/>
    <rect x="720" y="420" width="88" height="110" rx="4"/>
    <rect x="838" y="420" width="88" height="110" rx="4"/>
    <rect x="956" y="420" width="88" height="110" rx="4"/>
  </g>
  <!-- Windows row 2 -->
  <g fill="#5A7FA6" opacity="0.35">
