    <rect x="248" y="560" width="88" height="100" rx="4"/>
    <rect x="366" y="560" width="88" height="100" rx="4"/>
    <rect x="484" y="560" width="88" height="100" rx="4"/>
    <rect x="602" y="560" width="88" height="100" rx="4"/>
    <rect x="720" y="560" width="88" height="100" rx="4"/>
    <rect x="838" y="560" width="88" height="100" rx="4"/>
    <rect x="956" y="560" width="88" height="100" rx="4"/>
  </g>
  <!-- Pool -->
